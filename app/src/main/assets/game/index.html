<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Star Orchard Platformer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell" aria-label="Star Orchard Platformer">
      <section class="game-wrap" aria-label="Game stage">
        <div class="stage-frame">
          <canvas id="game" width="960" height="540" aria-label="Side-scrolling platform game canvas"></canvas>
          <div class="mission-dock" aria-label="Mission status">
            <span class="chapter-eyebrow" data-i18n="missionEyebrow">Mission</span>
            <div class="mission-heading">
              <strong id="questTitle">Star Orchard</strong>
              <span id="levelBadge" class="level-badge">Level 1/21</span>
            </div>
            <span class="chapter-name" id="chapterText">The orchard gate is waiting.</span>
            <div class="mission-meta" aria-hidden="true">
              <span data-i18n="routeLabel">ORCHARD ROUTE</span>
              <span data-i18n="stageCount">21 STAGES</span>
            </div>
            <div class="chapter-progress" aria-hidden="true">
              <span id="chapterProgress"></span>
            </div>
          </div>
          <div class="hud-strip" aria-label="Game status">
            <div class="stat-card"><span data-i18n="hudLevel">Level</span><strong id="levelText">1</strong></div>
            <div class="stat-card"><span data-i18n="hudLives">Lives</span><strong id="livesText">3</strong></div>
            <div class="stat-card"><span data-i18n="hudCoins">Coins</span><strong id="coinsText">0</strong></div>
            <div class="stat-card"><span data-i18n="hudScore">Score</span><strong id="scoreText">0</strong></div>
            <div class="stat-card wide"><span data-i18n="hudTime">Time</span><strong id="timeText">0</strong></div>
          </div>
          <button id="systemBtn" class="system-btn" type="button" data-i18n="systemBtn">系统设置</button>
          <div class="quick-actions" aria-label="Quick game actions">
            <button id="quickPauseBtn" class="quick-action" type="button" data-i18n="quickPauseBtn">P</button>
            <button id="quickRestartBtn" class="quick-action" type="button" data-i18n="quickRestartBtn">R</button>
            <button id="quickSaveBtn" class="quick-action save-only" type="button" data-i18n="quickSaveBtn">S</button>
            <button id="quickLoadBtn" class="quick-action save-only" type="button" data-i18n="quickLoadBtn">L</button>
          </div>
          <div id="overlay" class="overlay">
            <h1>Star Orchard</h1>
            <button id="overlayText" class="overlay-start" type="button">开始游戏</button>
          </div>
          <div class="touch-controls" aria-label="Touch game controls">
            <div class="touch-cluster move-cluster">
              <button id="touchLeft" class="touch-btn" type="button" aria-label="Move left">‹</button>
              <button id="touchRight" class="touch-btn" type="button" aria-label="Move right">›</button>
            </div>
            <div class="touch-cluster action-cluster">
              <button id="touchDash" class="touch-btn small" type="button" aria-label="Dash"><span class="touch-symbol">D</span><span class="touch-hint" data-touch-label="dash">冲刺</span></button>
              <button id="touchJump" class="touch-btn primary" type="button" aria-label="Jump"><span class="touch-symbol">J</span><span class="touch-hint" data-touch-label="jump">跳跃</span></button>
            </div>
          </div>
          <div id="systemModal" class="system-modal hidden" role="dialog" aria-modal="true" aria-labelledby="systemTitle">
            <div class="system-sheet">
              <div class="system-head">
                <h2 id="systemTitle" data-i18n="systemTitle">系统设置</h2>
                <button id="systemCloseBtn" class="icon-btn" type="button" aria-label="Close">×</button>
              </div>
              <div class="system-grid">
                <label class="system-section">
                  <span data-i18n="languageLabel">Language</span>
                  <select id="systemLanguageSelect">
                    <option value="zh">简体中文</option>
                    <option value="zhHK">中文古体</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="ru">Русский</option>
                    <option value="ar">العربية</option>
                    <option value="ja">日本語</option>
                    <option value="de">Deutsch</option>
                  </select>
                </label>
                <label class="system-section">
                  <span data-i18n="lightLabel">光照</span>
                  <select id="systemLightSelect">
                    <option value="auto" data-i18n="lightAuto">自然节律</option>
                    <option value="dawn" data-i18n="lightDawn">清晨</option>
                    <option value="day" data-i18n="lightDay">白昼</option>
                    <option value="dusk" data-i18n="lightDusk">傍晚</option>
                    <option value="night" data-i18n="lightNight">夜晚</option>
                  </select>
                </label>
                <label class="system-section">
                  <span data-i18n="weatherLabel">天气</span>
                  <select id="weatherSelect">
                    <option value="auto" data-i18n="weatherAuto">自然节律</option>
                    <option value="sunny" data-i18n="weatherSunny">晴天</option>
                    <option value="cloudy" data-i18n="weatherCloudy">多云</option>
                    <option value="rain" data-i18n="weatherRain">雨天</option>
                    <option value="storm" data-i18n="weatherStorm">雷电</option>
                  </select>
                </label>
                <label class="system-section">
                  <span data-i18n="levelSelectLabel">关卡</span>
                  <select id="levelSelect"></select>
                  <small id="levelLockText" class="system-note" data-i18n="levelLocked">通过前十关后开启选关。</small>
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" aria-label="Game controls and settings">
        <div class="controls">
          <button id="startBtn" type="button" data-i18n="startBtn">Start / Continue</button>
          <button id="restartBtn" type="button" data-i18n="restartBtn">Restart</button>
          <button id="pauseBtn" type="button" data-i18n="pauseBtn">Pause</button>
          <button id="soundBtn" type="button" aria-pressed="true" data-i18n="soundOn">Sound On</button>
          <button id="saveBtn" type="button" data-i18n="saveBtn">Save</button>
          <button id="loadBtn" type="button" data-i18n="loadBtn">Load</button>
        </div>

        <form class="settings" aria-label="Settings">
          <label>
            <span data-i18n="heroLabel">Hero quest</span>
            <input id="heroNameInput" maxlength="28" autocomplete="off" value="Star Orchard">
          </label>
          <label>
            <span data-i18n="languageLabel">Language</span>
            <select id="languageSelect">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="fr">Francais</option>
              <option value="es">Espanol</option>
              <option value="ru">Русский</option>
              <option value="ar">العربية</option>
            </select>
          </label>
          <label>
            <span data-i18n="lightLabel">Brightness</span>
            <select id="lightSelect">
              <option value="auto" data-i18n="lightAuto">Natural cycle</option>
              <option value="day" data-i18n="lightDay">Day</option>
              <option value="night" data-i18n="lightNight">Night</option>
            </select>
          </label>
        </form>

        <div class="cue-feed" id="cueFeed" aria-live="polite">Collect coins, avoid thorns, stomp enemies, and touch the flag.</div>
        <div class="control-map" aria-label="Keyboard controls">
          <span><kbd>A</kbd><kbd>D</kbd><b data-i18n="moveHint">Move</b></span>
          <span><kbd>Space</kbd><kbd>W</kbd><b data-i18n="jumpHint">Jump</b></span>
          <span><kbd>Shift</kbd><b data-i18n="dashHint">Dash</b></span>
          <span><kbd>P</kbd><b data-i18n="pauseHint">Pause</b></span>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
